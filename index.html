<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">

        <h1>🧠 JavaScript Quiz</h1>

        <div class="quiz-header">
            <span id="question-number">Question 1 of 5</span>
        </div>

        <h2 id="question">Question Here</h2>

        <ul class="options">

            <li>
                <button class="option-btn">Option 1</button>
            </li>

            <li>
                <button class="option-btn">Option 2</button>
            </li>

            <li>
                <button class="option-btn">Option 3</button>
            </li>

            <li>
                <button class="option-btn">Option 4</button>
            </li>

        </ul>

        <button id="next-btn">Next →</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
